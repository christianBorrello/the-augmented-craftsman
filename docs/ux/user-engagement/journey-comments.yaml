---
epic: epic5-user-engagement
title: "Reader Comments on a Post"
version: 1.0.0

personas:
  github_commenter:
    name: Tomasz Kowalski
    role: Senior developer, blog reader
    context: Active on GitHub, reads at desk, wants to discuss TDD topics
    motivation: Share counterpoints, ask clarifying questions
    devices: [desktop]
    auth_provider: github

  google_commenter:
    name: Maria Santos
    role: Junior developer, blog reader
    context: Has Google account, no GitHub, reads on mobile and desktop
    motivation: Thank the author, ask beginner questions
    devices: [mobile, desktop]
    auth_provider: google

  author_moderator:
    name: Christian
    role: Blog author and moderator
    context: Reviews comments at own pace, removes spam or inappropriate content
    devices: [desktop]

journey:
  id: J6
  name: reader-comments-on-post
  goal: Leave a comment on a blog post using social login
  trigger: Reader finishes a post and wants to respond
  preconditions:
    - At least one published post exists
    - Comments section rendered (Astro Island hydrated)
    - OAuth providers configured (Google, GitHub)
  postconditions:
    - Comment saved and displayed immediately
    - Reader identity shown via social profile (name, avatar)
    - Author can see and moderate comment from admin

  emotional_arc:
    start: { emotion: engaged, score: 3, reason: "Want to respond to the content" }
    middle: { emotion: brief_uncertainty, score: 2, reason: "OAuth redirect, will it work?" }
    end: { emotion: satisfied, score: 5, reason: "Comment posted, voice heard" }

  steps:
    - id: J6.1
      name: see-comments-section
      action: Reader scrolls past article to comments section
      system_response: >
        Display existing comments (newest first or oldest first TBD).
        Each comment shows: avatar, display_name, provider badge, timestamp, text.
        Show comment_count in section header.
        If no comments: "No comments yet. Be the first to share your thoughts."
      artifacts_produced: [comments_list, comment_count]
      artifacts_consumed: [slug]
      emotional_arc: { emotion: curious, score: 3, reason: "Others commented, social proof" }
      empty_state:
        condition: No comments on this post
        display: "No comments yet. Be the first to share your thoughts."

    - id: J6.2
      name: sign-in-prompt
      action: Reader sees sign-in prompt below comments
      system_response: >
        If not authenticated: show "Sign in to comment" with two buttons:
        "Sign in with Google" and "Sign in with GitHub".
        If already authenticated: show comment textarea with identity display.
      artifacts_produced: []
      artifacts_consumed: [session_token]
      emotional_arc: { emotion: confident, score: 4, reason: "Trusted providers, one click" }

    - id: J6.3
      name: oauth-flow
      action: Reader clicks provider button (Google or GitHub)
      system_response: >
        Redirect to OAuth provider consent screen.
        On success: redirect back to post page with session established.
        Extract display_name and avatar_url from provider profile.
        Store session in httpOnly cookie.
      artifacts_produced: [session_token, display_name, avatar_url, provider]
      artifacts_consumed: [slug]
      emotional_arc: { emotion: brief_pause, score: 3, reason: "OAuth redirect, familiar flow" }
      error_paths:
        - condition: OAuth flow fails (provider error)
          response: "Sign in failed. Please try again."
          recovery: Return to post page, sign-in prompt shown
        - condition: User denies consent
          response: No message (user chose to cancel)
          recovery: Return to post page, sign-in prompt shown
        - condition: Provider account suspended
          response: "Sign in failed. Please try again."
          recovery: Try other provider or contact admin

    - id: J6.4
      name: write-comment
      action: Reader types comment in textarea and clicks "Post Comment"
      system_response: >
        Validate: non-empty, max 2000 characters.
        Show character counter at 1800+ characters.
        POST /api/posts/{slug}/comments with session_token.
      artifacts_produced: [comment_text]
      artifacts_consumed: [session_token, slug]
      emotional_arc: { emotion: focused, score: 4, reason: "Composing response" }
      error_paths:
        - condition: Empty comment
          response: "Post Comment" button disabled when textarea empty
          recovery: Focus textarea
        - condition: Comment exceeds 2000 characters
          response: "Comment is too long (2000 character limit)"
          recovery: Shorten text, counter shows remaining
        - condition: Network error on submit
          response: "Could not post your comment. Check your connection and try again."
          recovery: Comment text preserved in textarea, retry
        - condition: Session expired
          response: "Your session has expired. Please sign in again."
          recovery: Comment text preserved in localStorage, re-auth, textarea pre-populated

    - id: J6.5
      name: comment-posted
      action: Reader sees their comment appear in the thread
      system_response: >
        Comment appears immediately with avatar, display_name, provider badge,
        timestamp ("just now"), and comment text.
        Toast: "Comment posted."
      artifacts_produced: [comment_id, created_at]
      artifacts_consumed: [comment_text, display_name, avatar_url, provider]
      emotional_arc: { emotion: satisfied, score: 5, reason: "My voice is heard" }

    - id: J6.6
      name: return-visit
      action: Reader returns to same post later
      system_response: >
        If session still valid: show comment form ready.
        Reader's previous comment visible in thread.
      artifacts_produced: []
      artifacts_consumed: [session_token, comments_list]
      emotional_arc: { emotion: recognized, score: 4, reason: "Still signed in, comment visible" }

  moderation_flow:
    - id: J6.M1
      name: author-reviews-comments
      action: Christian views comments in admin panel
      system_response: >
        List all comments across all posts, newest first.
        Show: post title, commenter name, provider, date, comment text, delete button.
      artifacts_produced: []
      artifacts_consumed: [auth_token]

    - id: J6.M2
      name: author-deletes-comment
      action: Christian clicks delete on inappropriate comment
      system_response: >
        Confirmation: "Delete this comment by {display_name}?"
        On confirm: remove comment from database and public view.
      artifacts_produced: []
      artifacts_consumed: [comment_id, auth_token]
      note: >
        Post-moderation: comments appear immediately.
        Author removes inappropriate ones manually at their own pace.
        No notification sent to commenter on deletion.

integration_validation:
  shared_artifact_consistency:
    - artifact: session_token
      must_match_across: [J6.3, J6.4, J6.5, J6.6]
      failure_message: "Session must persist across comment flow and return visits"
    - artifact: display_name
      must_match_across: [J6.3, J6.5]
      failure_message: "Display name from OAuth must match comment attribution"
    - artifact: comments_list
      must_match_across: [J6.1, J6.5, J6.6]
      failure_message: "Comment list must include newly posted comment without page refresh"

non_functional:
  performance:
    - "Comments section loads in <1s (lazy-loaded Astro Island)"
    - "Comment POST completes in <500ms"
    - "OAuth redirect round-trip under 5s (provider-dependent)"
  accessibility:
    - "Comment form textarea has associated label"
    - "Sign-in buttons have descriptive aria-labels"
    - "Comments list uses semantic HTML (article elements)"
    - "Focus moves to comment form after successful sign-in"
    - "Keyboard navigation through all interactive elements"
  security:
    - "OAuth tokens never exposed to client-side JavaScript"
    - "Session stored in httpOnly, Secure, SameSite=Lax cookie"
    - "Comment text sanitized server-side (prevent XSS)"
    - "CSRF protection on comment POST endpoint"
    - "Rate limiting: max 5 comments per user per 10 minutes"
  privacy:
    - "Only display_name and avatar_url stored from OAuth profile"
    - "Email from OAuth provider NOT stored or displayed"
    - "No tracking of commenter behavior beyond their comments"
