---
epic: blog-v1
title: "The Augmented Craftsman — v1 UX Journeys"
version: 1.0.0

personas:
  author:
    name: Christian
    role: Blog author and single admin user
    context: Software Engineer writing daily about Software Craftsmanship
    motivation: Publish content efficiently with a craftsman's focus
    devices: [desktop, laptop]
    frequency: daily

  reader:
    name: Anonymous Developer
    role: Blog reader
    context: Developer interested in TDD, Clean Architecture, DDD, XP
    motivation: Find relevant content, learn from real-world craftsmanship practice
    arrival: [search_engine, social_link, direct_navigation]
    devices: [desktop, mobile, tablet]

# -------------------------------------------------------------------
# Feature 0: Walking Skeleton
# -------------------------------------------------------------------
walking_skeleton:
  goal: Validate architecture end-to-end with minimal slice
  description: >
    Create a blog post via API, persist to PostgreSQL, retrieve via API,
    render in Astro. Proves all layers connect before building features.
  preconditions:
    - .NET API project compiles and starts
    - PostgreSQL database provisioned with schema
    - Astro project configured with API base URL
  postconditions:
    - A blog post round-trips through all layers
    - Astro renders the post at /posts/{slug}
  validates:
    - domain: BlogPost entity and Slug value object
    - application: CreatePost and GetPostById use cases
    - infrastructure: EF Core persistence to PostgreSQL
    - api: Minimal API POST and GET endpoints
    - frontend: Astro fetch-at-build and HTML rendering
  emotional_arc:
    start: { emotion: anxious, score: 2, reason: "Will all layers connect?" }
    end: { emotion: relieved, score: 5, reason: "It works end-to-end" }

# -------------------------------------------------------------------
# Journey 1: Author Publishes a Post
# -------------------------------------------------------------------
journeys:
  - id: J1
    name: author-publishes-post
    persona: author
    goal: Write and publish a blog post about Software Craftsmanship
    trigger: Christian has an idea for today's post
    preconditions:
      - Author has valid admin credentials
      - At least one tag exists (or author creates one inline)
    postconditions:
      - Post is live on public blog
      - Post has title, body, tags, and optionally a featured image
      - Post is accessible at /posts/{slug}

    steps:
      - id: J1.1
        name: login
        action: Enter email and password on admin login page
        system_response: Validate credentials, issue JWT, redirect to admin dashboard
        artifacts_produced: [auth_token]
        artifacts_consumed: []
        emotional_arc: { emotion: confident, score: 3, reason: "Speed bump but expected" }
        error_paths:
          - condition: Invalid credentials
            response: "Invalid email or password"
            recovery: Retry (max 5 attempts)
          - condition: Account locked
            response: "Too many attempts. Try again in 15 minutes."
            recovery: Wait and retry

      - id: J1.2
        name: create-post
        action: Enter title and write body in Markdown with code blocks
        system_response: Auto-generate slug from title, save as draft
        artifacts_produced: [post_id, slug]
        artifacts_consumed: [auth_token]
        emotional_arc: { emotion: focused, score: 4, reason: "Creative flow, writing" }
        error_paths:
          - condition: Empty title
            response: "Title is required"
            recovery: Focus title field
          - condition: Duplicate slug
            response: "A post with this URL already exists"
            recovery: Suggest alternative slug

      - id: J1.3
        name: add-tags
        action: Select existing tags from list or type to create new tag
        system_response: Associate selected tags with the post
        artifacts_produced: [tag_ids]
        artifacts_consumed: [post_id, auth_token]
        emotional_arc: { emotion: quick, score: 4, reason: "Tags just work" }
        error_paths:
          - condition: Duplicate tag name on create
            response: "Tag already exists — select it from the list"
            recovery: Show existing tag highlighted

      - id: J1.4
        name: upload-image
        action: Drag-drop or file-pick featured image
        system_response: Upload to ImageKit, store URL, show thumbnail preview
        artifacts_produced: [featured_image_url]
        artifacts_consumed: [post_id, auth_token]
        emotional_arc: { emotion: smooth, score: 4, reason: "Image is uploaded and visible" }
        optional: true
        error_paths:
          - condition: Upload fails (network, ImageKit error)
            response: "Upload failed. Try again."
            recovery: Retry. Post remains saveable without image.
          - condition: File too large
            response: "Image must be under 10MB"
            recovery: Compress or choose different image

      - id: J1.5
        name: preview
        action: Click "Preview" button
        system_response: Render Markdown with Shiki syntax highlighting, show featured image
        artifacts_produced: []
        artifacts_consumed: [post_id, slug, featured_image_url, tag_ids]
        emotional_arc: { emotion: satisfied, score: 5, reason: "Looks right" }
        error_paths:
          - condition: Markdown contains invalid syntax
            response: Show rendered output with graceful degradation, display warning banner
            recovery: Edit and re-preview

      - id: J1.6
        name: publish
        action: Click "Publish" button
        system_response: Set status to Published, record publish date
        artifacts_produced: [published_date]
        artifacts_consumed: [post_id, auth_token]
        emotional_arc: { emotion: relieved, score: 5, reason: "It's live" }

      - id: J1.7
        name: verify
        action: Open public post URL in new browser tab
        system_response: Astro renders full post with content, image, tags, date
        artifacts_produced: []
        artifacts_consumed: [slug]
        emotional_arc: { emotion: proud, score: 5, reason: "That reads well" }
        note: >
          Since Astro is SSG, verification requires a build trigger.
          In dev, this could be a manual rebuild or a webhook.

  # -------------------------------------------------------------------
  # Journey 2: Reader Discovers and Reads Content
  # -------------------------------------------------------------------
  - id: J2
    name: reader-discovers-content
    persona: reader
    goal: Find and read a post about Software Craftsmanship
    trigger: Search engine result, social media link, or direct visit
    preconditions:
      - At least one published post exists
    postconditions:
      - Reader has read an article
      - Reader is aware of related content

    steps:
      - id: J2.1
        name: land-on-homepage
        action: Navigate to homepage
        system_response: Display recent posts in reverse chronological order with title, date, tags, excerpt
        artifacts_produced: [post_list]
        artifacts_consumed: []
        emotional_arc: { emotion: curious, score: 3, reason: "Clean, fast site. Looks credible." }
        empty_state:
          condition: No published posts
          display: "Coming soon. The first post is being forged."

      - id: J2.2
        name: browse-posts
        action: Scroll through post list, scan titles and excerpts
        system_response: Paginated or full list of posts with metadata
        artifacts_produced: []
        artifacts_consumed: [post_list]
        emotional_arc: { emotion: scanning, score: 3, reason: "I can see what's here" }

      - id: J2.3
        name: filter-by-tag
        action: Click a tag badge on any post card
        system_response: Show only posts with that tag, highlight active filter
        artifacts_produced: [active_tag]
        artifacts_consumed: [post_list]
        emotional_arc: { emotion: focused, score: 4, reason: "Now showing only TDD posts" }
        empty_state:
          condition: No posts match the selected tag
          display: "No posts tagged '{tag}' yet."

      - id: J2.4
        name: read-post
        action: Click post title to open full article
        system_response: >
          Display full post: title, publish date, author, featured image,
          Markdown body with Shiki code blocks, tag badges
        artifacts_produced: [current_post]
        artifacts_consumed: [slug]
        emotional_arc: { emotion: engaged, score: 5, reason: "Good content, well formatted" }
        error_paths:
          - condition: Post not found (stale link, deleted post)
            response: 404 page with link back to homepage
            recovery: Navigate to homepage

      - id: J2.5
        name: navigate-related
        action: Scroll to bottom of article, see related posts section
        system_response: Display up to 3 posts sharing the same tags, excluding current post. Ranked by shared tag count (descending), then by publish date (newest first).
        artifacts_produced: [related_posts]
        artifacts_consumed: [current_post, tag_ids]
        emotional_arc: { emotion: interested, score: 5, reason: "More on this topic" }
        empty_state:
          condition: No related posts found
          display: Section is hidden (not shown if empty)

  # -------------------------------------------------------------------
  # Journey 3: Author Manages Content
  # -------------------------------------------------------------------
  - id: J3
    name: author-manages-content
    persona: author
    goal: Edit, update, or delete existing blog posts
    trigger: Typo found, content needs updating, or post should be removed
    preconditions:
      - Author is authenticated
      - At least one post exists
    postconditions:
      - Content is updated or removed
      - Changes reflected on public site after next build

    steps:
      - id: J3.1
        name: view-all-posts
        action: Navigate to admin post list
        system_response: >
          Display all posts sorted by date (newest first) showing:
          title, status (Draft/Published), publish date, tag count, edit/delete actions
        artifacts_produced: [post_list]
        artifacts_consumed: [auth_token]
        emotional_arc: { emotion: in_control, score: 5, reason: "I see everything at a glance" }

      - id: J3.2
        name: edit-post
        action: Click edit on a post, modify title, body, or image
        system_response: Pre-populate form with existing data (same UI as create). Slug is read-only (immutable after creation).
        artifacts_produced: [post_id, title, content]
        artifacts_consumed: [post_id, auth_token]
        emotional_arc: { emotion: focused, score: 5, reason: "Same editor as create, predictable" }
        error_paths:
          - condition: Post not found (deleted by another tab)
            response: "Post not found"
            recovery: Redirect to post list
          - condition: Empty title on save
            response: "Title is required"
            recovery: Same validation as create

      - id: J3.3
        name: update-tags
        action: Add or remove tag associations on existing post
        system_response: Save immediately, refresh tag list on post
        artifacts_produced: [tag_ids]
        artifacts_consumed: [post_id, auth_token]
        emotional_arc: { emotion: quick, score: 5, reason: "Tags updated" }

      - id: J3.4
        name: delete-post
        action: Click delete, see confirmation dialog showing post title
        system_response: >
          Show confirmation: "Delete '{post_title}'? This cannot be undone."
          On confirm: remove post, redirect to post list.
        artifacts_produced: []
        artifacts_consumed: [post_id, auth_token]
        emotional_arc: { emotion: cautious_then_confirmed, score: 4, reason: "Gone. No undo. Deliberate." }
        error_paths:
          - condition: Post already deleted
            response: "Post not found"
            recovery: Redirect to post list

  # -------------------------------------------------------------------
  # Journey 4: Author Manages Tags
  # -------------------------------------------------------------------
  - id: J4
    name: author-manages-tags
    persona: author
    goal: Create, edit, and delete tags to organize blog content
    trigger: New topic area, rename needed, or cleanup of unused tags
    preconditions:
      - Author is authenticated
    postconditions:
      - Tag taxonomy is clean and consistent
      - All post-tag associations remain valid

    steps:
      - id: J4.1
        name: view-tags
        action: Navigate to tag management page
        system_response: Display all tags alphabetically with post count for each
        artifacts_produced: [tag_list]
        artifacts_consumed: [auth_token]
        emotional_arc: { emotion: organized, score: 5, reason: "I see my taxonomy" }
        empty_state:
          condition: No tags exist
          display: "No tags yet. Create your first tag to start organizing content."

      - id: J4.2
        name: create-tag
        action: Type tag name, submit
        system_response: Create tag, auto-generate slug, add to list
        artifacts_produced: [tag_id, tag_slug]
        artifacts_consumed: [auth_token]
        emotional_arc: { emotion: quick, score: 5, reason: "Tag created" }
        error_paths:
          - condition: Duplicate tag name
            response: "A tag named '{name}' already exists"
            recovery: Use different name or navigate to existing tag
          - condition: Empty name
            response: "Tag name is required"
            recovery: Focus input field
          - condition: Name too long
            response: "Tag name must be 50 characters or fewer"
            recovery: Shorten name

      - id: J4.3
        name: edit-tag
        action: Click edit, change tag name
        system_response: Update tag name, regenerate slug, propagate to all linked posts
        artifacts_produced: [tag_id, tag_slug]
        artifacts_consumed: [tag_id, auth_token]
        emotional_arc: { emotion: careful, score: 4, reason: "Rename propagated everywhere" }
        error_paths:
          - condition: Duplicate tag name after rename
            response: "A tag named '{name}' already exists"
            recovery: Choose different name

      - id: J4.4
        name: delete-tag
        action: Click delete, see impact count
        system_response: >
          Show confirmation: "Delete tag '{name}'? {N} posts will lose this tag."
          On confirm: remove tag and all post-tag associations.
          Posts themselves are NOT deleted.
        artifacts_produced: []
        artifacts_consumed: [tag_id, auth_token]
        emotional_arc: { emotion: informed_then_deliberate, score: 3, reason: "I understand the impact" }
        error_paths:
          - condition: Tag already deleted
            response: "Tag not found"
            recovery: Redirect to tag list

# -------------------------------------------------------------------
# Integration Checkpoints
# -------------------------------------------------------------------
integration_checkpoints:
  - name: post-creation-to-reading
    producer: J1 (author-publishes-post)
    consumer: J2 (reader-discovers-content)
    artifact: BlogPost (with slug, content, tags, image)
    validation: Post created in J1 appears in J2 homepage list after Astro rebuild

  - name: tag-management-to-filtering
    producer: J4 (author-manages-tags)
    consumer: J2.3 (filter-by-tag)
    artifact: Tag (with tag_slug, tag_name)
    validation: Tags created/renamed in J4 appear correctly as filter options in J2

  - name: tag-rename-propagation
    producer: J4.3 (edit-tag)
    consumer: J1.3 (add-tags), J2.4 (read-post), J3.3 (update-tags)
    artifact: tag_name, tag_slug
    validation: Renamed tag reflects new name in all post displays and admin selectors

  - name: post-deletion-cascades
    producer: J3.4 (delete-post)
    consumer: J2 (reader-discovers-content)
    artifact: post_id removal
    validation: Deleted post no longer appears on homepage or via direct URL after rebuild

  - name: image-upload-to-display
    producer: J1.4 (upload-image)
    consumer: J2.4 (read-post)
    artifact: featured_image_url (ImageKit URL)
    validation: Image uploaded in J1 renders correctly in J2 single post view

  - name: auth-gate
    producer: J1.1 (login)
    consumer: J1.*, J3.*, J4.*
    artifact: auth_token (JWT)
    validation: All admin endpoints reject requests without valid auth_token
