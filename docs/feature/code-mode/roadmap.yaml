feature_id: code-mode
title: "Code Mode — IDE-style code blocks"
rigor: lean
status: IN_PROGRESS

phases:
  - phase_id: "01"
    name: "Implementation"
    steps:
      - step_id: "01-01"
        name: "Replace regex parser with marked + shiki"
        description: |
          Install marked and configure shiki for server-side syntax highlighting.
          Create a markdown renderer that transforms raw markdown into HTML with
          syntax-highlighted code blocks. Remove the regex parser from [slug].astro.
        files_to_modify:
          - frontend/package.json
          - frontend/src/data/markdown.ts
          - frontend/src/pages/blog/[slug].astro
        acceptance_criteria:
          - Fenced code blocks render as <pre><code> with syntax tokens
          - Prose formatting (bold, italic, headings, blockquotes) still works
          - Shiki uses JetBrains Darcula-inspired theme
          - No flash of unstyled content (server-side rendering)

      - step_id: "01-02"
        name: "Apply Code Mode CSS (chrome, gutter, badge, copy)"
        description: |
          Port the validated CSS from code-mode-prototype.html into the Astro
          global stylesheet. Add window chrome (dots + filename), line numbers
          gutter, language badge, and copy button with JS feedback.
        files_to_modify:
          - frontend/src/styles/global.css
          - frontend/src/data/markdown.ts
        acceptance_criteria:
          - Code blocks show macOS window dots + filename
          - Line numbers visible and non-selectable
          - Language badge in top-right corner
          - Copy button copies code to clipboard
          - JetBrains Darcula syntax colors applied

      - step_id: "01-03"
        name: "Visual verification on live posts"
        description: |
          Verify the code mode renders correctly on all seeded blog posts.
          Test C#, bash, text, and plain code blocks. Clean up prototype file.
        files_to_modify:
          - frontend/code-mode-prototype.html
        acceptance_criteria:
          - All 6 blog posts render code blocks correctly
          - C#, bash, and plain text blocks all highlighted
          - Dark mode works correctly
          - Copy button functional
