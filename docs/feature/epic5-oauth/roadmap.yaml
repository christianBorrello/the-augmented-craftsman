project_id: "epic5-oauth"
title: "Epic 5 Deliver 2: OAuth & Reader Sessions"
description: >
  Implement OAuth sign-in (Google/GitHub) and reader session management for comment
  authentication. Includes domain entities, application use cases, driven port for
  OAuth providers, EF Core persistence, API endpoints, and acceptance test infrastructure
  (StubOAuthClient, OAuthApiDriver, ReaderSessionContext).
rigor: standard
validation:
  status: approved
  reviewed_by: orchestrator
  reviewed_at: "2026-03-08"

phases:
  - id: "01"
    name: "Walking Skeleton"
    description: "Prove the OAuth vertical slice works end-to-end"
    steps:
      - step_id: "01-01"
        title: "OAuth callback creates reader session (walking skeleton)"
        description: >
          Build the entire OAuth vertical slice: domain, application, infrastructure,
          API, and test infrastructure. This proves the architecture works for reader
          authentication.

          Domain: AuthProvider enum (Google, GitHub), ReaderSession entity (Id, DisplayName,
          AvatarUrl, Provider, ProviderId, CreatedAtUtc, ExpiresAtUtc).

          Application: IOAuthClient driven port (ExchangeCodeAsync, GetUserProfileAsync),
          IReaderSessionRepository driven port (SaveAsync, FindByIdAsync, DeleteAsync),
          HandleOAuthCallback use case (exchanges code, creates session, returns session ID),
          CheckSession use case (validates session by ID, returns profile or not-authenticated).

          Infrastructure: ReaderSessionConfiguration (EF Core, maps to reader_sessions table,
          value object conversions, snake_case columns), EfReaderSessionRepository,
          AddReaderSessionsTable migration.

          API: OAuthEndpoints with GET /api/auth/oauth/{provider} (initiate),
          GET /api/auth/oauth/{provider}/callback (handle callback),
          GET /api/auth/session (check), POST /api/auth/signout (sign out).
          Session ID stored in httpOnly cookie. Register in Program.cs.

          Test infrastructure: StubOAuthClient (configurable mock for IOAuthClient),
          OAuthApiDriver (follows existing driver pattern), ReaderSessionContext
          (stores session cookie across steps), OAuthSteps step definitions,
          TestHooks cleanup for reader_sessions table, DependencyConfig registration.

        acceptance_criteria:
          - "GitHub OAuth callback creates session with display name and provider"
          - "Google OAuth callback creates session with display name and provider"
          - "Session check returns authenticated status with profile"
          - "StubOAuthClient properly mocks OAuth provider behavior"
          - "ReaderSession entity stores provider, display name, expiry"
          - "EF Core migration creates reader_sessions table"

        files_to_modify:
          # Domain
          - backend/src/TacBlog.Domain/AuthProvider.cs
          - backend/src/TacBlog.Domain/ReaderSession.cs
          # Application
          - backend/src/TacBlog.Application/Ports/Driven/IOAuthClient.cs
          - backend/src/TacBlog.Application/Ports/Driven/IReaderSessionRepository.cs
          - backend/src/TacBlog.Application/Features/OAuth/HandleOAuthCallback.cs
          - backend/src/TacBlog.Application/Features/OAuth/CheckSession.cs
          - backend/src/TacBlog.Application/Features/OAuth/OAuthUserProfile.cs
          # Infrastructure
          - backend/src/TacBlog.Infrastructure/Persistence/ReaderSessionConfiguration.cs
          - backend/src/TacBlog.Infrastructure/Persistence/EfReaderSessionRepository.cs
          - backend/src/TacBlog.Infrastructure/Persistence/TacBlogDbContext.cs
          # API
          - backend/src/TacBlog.Api/Endpoints/OAuthEndpoints.cs
          - backend/src/TacBlog.Api/Program.cs
          # Test infrastructure
          - backend/tests/TacBlog.Acceptance.Tests/Support/StubOAuthClient.cs
          - backend/tests/TacBlog.Acceptance.Tests/Support/TacBlogWebApplicationFactory.cs
          - backend/tests/TacBlog.Acceptance.Tests/Drivers/OAuthApiDriver.cs
          - backend/tests/TacBlog.Acceptance.Tests/Contexts/ReaderSessionContext.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/OAuthSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Hooks/TestHooks.cs
          - backend/tests/TacBlog.Acceptance.Tests/Support/DependencyConfig.cs
          # Unit tests
          - backend/tests/TacBlog.Application.Tests/Features/OAuth/HandleOAuthCallbackShould.cs
          - backend/tests/TacBlog.Application.Tests/Features/OAuth/CheckSessionShould.cs

        dependencies: []
        estimated_complexity: "high"
        max_turns: 50

  - id: "02"
    name: "OAuth Initiation and Sign Out"
    description: "Complete the OAuth flow with initiation redirect and sign out"
    steps:
      - step_id: "02-01"
        title: "Initiate OAuth redirects to provider"
        description: >
          Enable and pass OAuth.feature scenario:
          - Initiate GitHub sign-in redirects to provider

          The InitiateOAuth endpoint generates state parameter, stores returnUrl,
          and redirects to the provider's authorization URL. StubOAuthClient provides
          the authorization URL. The acceptance test verifies the redirect response.

        acceptance_criteria:
          - "GET /api/auth/oauth/github redirects to provider authorization URL"
          - "State parameter is generated and included in redirect"
          - "ReturnUrl is preserved for post-callback redirect"

        files_to_modify:
          - backend/src/TacBlog.Application/Features/OAuth/InitiateOAuth.cs
          - backend/src/TacBlog.Api/Endpoints/OAuthEndpoints.cs
          - backend/tests/TacBlog.Acceptance.Tests/Drivers/OAuthApiDriver.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/OAuthSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/OAuth.feature

        dependencies: ["01-01"]
        estimated_complexity: "medium"
        max_turns: 35

      - step_id: "02-02"
        title: "Sign out clears reader session"
        description: >
          Add SignOut use case: deletes reader session from database, clears
          httpOnly cookie. Enable and pass OAuth.feature scenarios:
          - Sign out clears the reader session
          - Sign out with no active session succeeds silently

        acceptance_criteria:
          - "POST /api/auth/signout deletes session and clears cookie"
          - "Sign out with no session returns 204 (idempotent)"
          - "Session check after sign out returns not authenticated"

        files_to_modify:
          - backend/src/TacBlog.Application/Features/OAuth/SignOut.cs
          - backend/src/TacBlog.Api/Endpoints/OAuthEndpoints.cs
          - backend/src/TacBlog.Api/Program.cs
          - backend/tests/TacBlog.Acceptance.Tests/Drivers/OAuthApiDriver.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/OAuthSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/OAuth.feature
          - backend/tests/TacBlog.Application.Tests/Features/OAuth/SignOutShould.cs

        dependencies: ["01-01"]
        estimated_complexity: "medium"
        max_turns: 35

  - id: "03"
    name: "Error Paths and Edge Cases"
    description: "Handle OAuth error scenarios and session edge cases"
    steps:
      - step_id: "03-01"
        title: "OAuth error paths (consent denied, provider error, invalid state)"
        description: >
          Enable and pass OAuth.feature scenarios:
          - OAuth consent denied returns to post without error
          - OAuth provider error returns to post with error indicator
          - OAuth callback with invalid state parameter is rejected

          StubOAuthClient configurable for consent-denied and provider-error behaviors.
          State validation in HandleOAuthCallback use case.

        acceptance_criteria:
          - "Consent denied redirects to returnUrl without creating session"
          - "Provider error redirects to returnUrl with auth_error=failed"
          - "Invalid state redirects to returnUrl with auth_error=failed"

        files_to_modify:
          - backend/src/TacBlog.Application/Features/OAuth/HandleOAuthCallback.cs
          - backend/src/TacBlog.Api/Endpoints/OAuthEndpoints.cs
          - backend/tests/TacBlog.Acceptance.Tests/Support/StubOAuthClient.cs
          - backend/tests/TacBlog.Acceptance.Tests/Drivers/OAuthApiDriver.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/OAuthSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/OAuth.feature
          - backend/tests/TacBlog.Application.Tests/Features/OAuth/HandleOAuthCallbackShould.cs

        dependencies: ["01-01"]
        estimated_complexity: "medium"
        max_turns: 35

      - step_id: "03-02"
        title: "Session edge cases (no session, expired, unsupported provider)"
        description: >
          Enable and pass OAuth.feature scenarios:
          - Session check with no session returns not authenticated
          - Session check with expired session returns not authenticated
          - Initiate sign-in with unsupported provider is rejected

          CheckSession validates session expiry. InitiateOAuth rejects unsupported providers.
          ReaderSessionTestDataBuilder for creating expired sessions in Given steps.

        acceptance_criteria:
          - "No session cookie returns authenticated=false"
          - "Expired session returns authenticated=false"
          - "Unsupported provider (twitter) returns 400"

        files_to_modify:
          - backend/src/TacBlog.Application/Features/OAuth/CheckSession.cs
          - backend/src/TacBlog.Api/Endpoints/OAuthEndpoints.cs
          - backend/tests/TacBlog.Acceptance.Tests/Support/ReaderSessionTestDataBuilder.cs
          - backend/tests/TacBlog.Acceptance.Tests/Drivers/OAuthApiDriver.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/OAuthSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/OAuth.feature
          - backend/tests/TacBlog.Application.Tests/Features/OAuth/CheckSessionShould.cs

        dependencies: ["01-01"]
        estimated_complexity: "medium"
        max_turns: 35

implementation_order:
  - "01-01"
  - "02-01"
  - "02-02"
  - "03-01"
  - "03-02"

total_steps: 5
estimated_total_complexity: "high"
