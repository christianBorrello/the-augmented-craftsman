project_id: "epic5-likes"
title: "Epic 5 Deliver 1: Walking Skeleton + Likes"
description: >
  Implement the Like feature end-to-end using Outside-In TDD. Starting with a walking
  skeleton that proves the Engagement vertical slice works, then extending to full
  like/unlike/check functionality with error handling and edge cases.
rigor: standard
validation:
  status: approved
  reviewed_by: nw-software-crafter-reviewer
  reviewed_at: "2026-03-08"

phases:
  - id: "01"
    name: "Walking Skeleton"
    description: "Prove the Engagement vertical slice works end-to-end"
    steps:
      - step_id: "01-01"
        title: "Like a post end-to-end (walking skeleton)"
        description: >
          Build the entire Like vertical slice: domain, application, infrastructure,
          API, and acceptance test infrastructure. This is the walking skeleton that
          proves the architecture works for engagement features.

          Domain: VisitorId value object (readonly record struct, validated UUID),
          Like entity (PostSlug + VisitorId + CreatedAtUtc, composite identity).

          Application: ILikeRepository driven port (SaveAsync, CountBySlugAsync,
          ExistsAsync), LikePost use case (validates post exists via IBlogPostRepository,
          creates Like, persists via ILikeRepository), GetLikeCount use case.

          Infrastructure: LikeConfiguration (EF Core, maps to 'likes' table, composite PK,
          value object conversions, snake_case columns), EfLikeRepository, AddEngagementTables
          migration (likes table only for now).

          API: LikeEndpoints with POST /api/posts/{slug}/likes and
          GET /api/posts/{slug}/likes/count. Register in Program.cs via MapLikeEndpoints().

          Test infrastructure: LikeApiDriver (follows PostApiDriver pattern),
          LikeSteps step definitions, TestHooks cleanup for likes table,
          DependencyConfig registration of new driver.

        acceptance_criteria:
          - "Walking skeleton scenario 1 passes: like a post increments count to 1"
          - "Walking skeleton scenario 2 passes: check count returns 3 for 3 likes"
          - "VisitorId rejects empty GUID and null"
          - "Like entity enforces composite identity (PostSlug, VisitorId)"
          - "LikePost returns success with updated count"
          - "LikePost validates post exists (returns not found if missing)"
          - "GetLikeCount returns 0 for post with no likes"
          - "EF Core migration creates likes table with PK and FK"

        files_to_modify:
          # Domain
          - backend/src/TacBlog.Domain/VisitorId.cs
          - backend/src/TacBlog.Domain/Like.cs
          # Application
          - backend/src/TacBlog.Application/Ports/Driven/ILikeRepository.cs
          - backend/src/TacBlog.Application/Features/Likes/LikePost.cs
          - backend/src/TacBlog.Application/Features/Likes/GetLikeCount.cs
          # Infrastructure
          - backend/src/TacBlog.Infrastructure/Persistence/LikeConfiguration.cs
          - backend/src/TacBlog.Infrastructure/Persistence/EfLikeRepository.cs
          - backend/src/TacBlog.Infrastructure/Persistence/TacBlogDbContext.cs
          # API
          - backend/src/TacBlog.Api/Endpoints/LikeEndpoints.cs
          - backend/src/TacBlog.Api/Program.cs
          # Test infrastructure
          - backend/tests/TacBlog.Acceptance.Tests/Drivers/LikeApiDriver.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/LikeSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Hooks/TestHooks.cs
          - backend/tests/TacBlog.Acceptance.Tests/Support/DependencyConfig.cs
          # Unit tests
          - backend/tests/TacBlog.Domain.Tests/VisitorIdShould.cs
          - backend/tests/TacBlog.Application.Tests/Features/Likes/LikePostShould.cs
          - backend/tests/TacBlog.Application.Tests/Features/Likes/GetLikeCountShould.cs

        dependencies: []
        estimated_complexity: "high"
        max_turns: 50

  - id: "02"
    name: "Unlike and Check"
    description: "Add unlike and check-if-liked functionality"
    steps:
      - step_id: "02-01"
        title: "Unlike a previously liked post"
        description: >
          Add UnlikePost use case: removes like by (PostSlug, VisitorId), idempotent
          (no error if like doesn't exist). Add DELETE endpoint to LikeEndpoints.
          Extend ILikeRepository with DeleteAsync. Extend EfLikeRepository.

          Enable and pass Likes.feature scenarios:
          - Unlike a previously liked post
          - Unlike is idempotent when no like exists

        acceptance_criteria:
          - "Unlike removes like and decrements count"
          - "Unlike when no like exists returns count 0 (idempotent)"
          - "Unlike validates post exists (404 if missing)"

        files_to_modify:
          - backend/src/TacBlog.Application/Features/Likes/UnlikePost.cs
          - backend/src/TacBlog.Application/Ports/Driven/ILikeRepository.cs
          - backend/src/TacBlog.Infrastructure/Persistence/EfLikeRepository.cs
          - backend/src/TacBlog.Api/Endpoints/LikeEndpoints.cs
          - backend/tests/TacBlog.Acceptance.Tests/Drivers/LikeApiDriver.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/LikeSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/Likes.feature
          - backend/tests/TacBlog.Application.Tests/Features/Likes/UnlikePostShould.cs

        dependencies: ["01-01"]
        estimated_complexity: "medium"
        max_turns: 35

      - step_id: "02-02"
        title: "Check if visitor has liked a post"
        description: >
          Add CheckIfLiked use case: queries ILikeRepository.ExistsAsync for
          (PostSlug, VisitorId), returns liked status + count.
          Add GET /api/posts/{slug}/likes/check/{visitorId} endpoint.

          Enable and pass Likes.feature scenarios:
          - Check if visitor has liked a post
          - Check like status when visitor has not liked a post

        acceptance_criteria:
          - "Check returns liked=true with count when visitor has liked"
          - "Check returns liked=false with count when visitor has not liked"
          - "Check validates post exists (404 if missing)"

        files_to_modify:
          - backend/src/TacBlog.Application/Features/Likes/CheckIfLiked.cs
          - backend/src/TacBlog.Api/Endpoints/LikeEndpoints.cs
          - backend/tests/TacBlog.Acceptance.Tests/Drivers/LikeApiDriver.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/LikeSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/Likes.feature
          - backend/tests/TacBlog.Application.Tests/Features/Likes/CheckIfLikedShould.cs

        dependencies: ["01-01"]
        estimated_complexity: "medium"
        max_turns: 35

  - id: "03"
    name: "Idempotency and Multiple Visitors"
    description: "Verify like deduplication and multi-visitor behavior"
    steps:
      - step_id: "03-01"
        title: "Like idempotency and multiple visitors"
        description: >
          Enable and pass Likes.feature scenarios:
          - Like is idempotent for the same visitor (second like returns count 1, not 2)
          - Multiple visitors can like the same post (3 existing + 1 new = 4)

          LikePost use case should handle idempotency: if like already exists,
          return current count without error. EfLikeRepository uses
          INSERT ON CONFLICT DO NOTHING pattern or check-then-insert.

        acceptance_criteria:
          - "Same visitor liking twice results in count 1 (not 2)"
          - "Response indicates post is liked after idempotent like"
          - "4 different visitors result in count 4"

        files_to_modify:
          - backend/src/TacBlog.Application/Features/Likes/LikePost.cs
          - backend/src/TacBlog.Infrastructure/Persistence/EfLikeRepository.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/LikeSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/Likes.feature
          - backend/tests/TacBlog.Application.Tests/Features/Likes/LikePostShould.cs

        dependencies: ["01-01"]
        estimated_complexity: "medium"
        max_turns: 35

  - id: "04"
    name: "Error Paths and Boundaries"
    description: "Handle error conditions and boundary cases"
    steps:
      - step_id: "04-01"
        title: "Non-existent post error paths"
        description: >
          Enable and pass Likes.feature scenarios:
          - Like a non-existent post returns 404
          - Unlike a non-existent post returns 404
          - Check like status on non-existent post returns 404
          - Get like count for non-existent post returns 404

          All four use cases (LikePost, UnlikePost, CheckIfLiked, GetLikeCount)
          must validate that the post slug references an existing published post
          via IBlogPostRepository.FindBySlugAsync. Return NotFound result if missing.

        acceptance_criteria:
          - "Like non-existent post returns 404 with 'Post not found'"
          - "Unlike non-existent post returns 404 with 'Post not found'"
          - "Check non-existent post returns 404 with 'Post not found'"
          - "Get count non-existent post returns 404 with 'Post not found'"

        files_to_modify:
          - backend/src/TacBlog.Application/Features/Likes/LikePost.cs
          - backend/src/TacBlog.Application/Features/Likes/UnlikePost.cs
          - backend/src/TacBlog.Application/Features/Likes/CheckIfLiked.cs
          - backend/src/TacBlog.Application/Features/Likes/GetLikeCount.cs
          - backend/src/TacBlog.Api/Endpoints/LikeEndpoints.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/LikeSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/Likes.feature
          - backend/tests/TacBlog.Application.Tests/Features/Likes/LikePostShould.cs
          - backend/tests/TacBlog.Application.Tests/Features/Likes/UnlikePostShould.cs
          - backend/tests/TacBlog.Application.Tests/Features/Likes/CheckIfLikedShould.cs
          - backend/tests/TacBlog.Application.Tests/Features/Likes/GetLikeCountShould.cs

        dependencies: ["02-01", "02-02"]
        estimated_complexity: "medium"
        max_turns: 35

      - step_id: "04-02"
        title: "Invalid visitor ID and count boundary"
        description: >
          Enable and pass Likes.feature scenarios:
          - Like with invalid visitor identifier is rejected (400)
          - Like count is never negative regardless of unlike operations

          LikeEndpoints validates visitorId format before calling use case.
          Unlike on a post with 0 likes returns count 0 (never negative).

        acceptance_criteria:
          - "Empty visitor ID returns 400"
          - "Unlike on post with 0 likes returns count 0"
          - "Count is always >= 0"

        files_to_modify:
          - backend/src/TacBlog.Api/Endpoints/LikeEndpoints.cs
          - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/LikeSteps.cs
          - backend/tests/TacBlog.Acceptance.Tests/Features/Epic5_UserEngagement/Likes.feature

        dependencies: ["02-01"]
        estimated_complexity: "low"
        max_turns: 20

implementation_order:
  - "01-01"
  - "02-01"
  - "02-02"
  - "03-01"
  - "04-01"
  - "04-02"

total_steps: 6
estimated_total_complexity: "medium-high"
