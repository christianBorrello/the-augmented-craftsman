project_id: "epic4-public-reading"
title: "Epic 4 — Public Reading"
description: >
  Public read-only API endpoints for anonymous blog readers.
  Browse published posts, filter by tag, read single posts,
  browse tags with counts, and see related posts.

validation:
  status: "approved"

phases:
  - id: "01"
    name: "Use Cases — Public Reading"
    description: "Application layer use cases for public reading features"
    steps:
      - step_id: "01-01"
        title: "BrowsePublishedPosts use case"
        description: >
          Create BrowsePublishedPosts use case that returns only published posts
          sorted by publishedAt descending. Must exclude drafts.
          The existing ListPosts returns ALL posts (admin view).
          This new use case returns only published posts with summary fields
          (no content body in list view).
        acceptance_criteria:
          - "Returns only posts with Status == Published"
          - "Sorted by PublishedAt descending (newest first)"
          - "Returns empty list when no published posts exist"
        files_to_modify:
          - "backend/src/TacBlog.Application/Features/Posts/BrowsePublishedPosts.cs"
          - "backend/tests/TacBlog.Application.Tests/Features/Posts/BrowsePublishedPostsShould.cs"

      - step_id: "01-02"
        title: "ReadPublishedPost use case"
        description: >
          Create ReadPublishedPost use case that returns a single post by slug
          ONLY if published. Drafts return NotFound. Differs from existing
          GetPostBySlug which returns any post regardless of status.
        acceptance_criteria:
          - "Returns published post by slug"
          - "Returns NotFound for draft posts"
          - "Returns NotFound for non-existent slugs"
        files_to_modify:
          - "backend/src/TacBlog.Application/Features/Posts/ReadPublishedPost.cs"
          - "backend/tests/TacBlog.Application.Tests/Features/Posts/ReadPublishedPostShould.cs"

      - step_id: "01-03"
        title: "FilterPostsByTag use case"
        description: >
          Create FilterPostsByTag use case. Finds tag by slug, returns published
          posts with that tag. Returns 404 if tag slug doesn't exist.
          Returns empty list if tag exists but has no published posts.
        acceptance_criteria:
          - "Returns published posts filtered by tag slug"
          - "Returns NotFound for non-existent tag slug"
          - "Returns empty list for tag with no published posts"
        files_to_modify:
          - "backend/src/TacBlog.Application/Features/Posts/FilterPostsByTag.cs"
          - "backend/tests/TacBlog.Application.Tests/Features/Posts/FilterPostsByTagShould.cs"
        dependencies: []

      - step_id: "01-04"
        title: "BrowsePublicTags use case"
        description: >
          Create BrowsePublicTags use case. Returns tags with published post
          counts, excluding tags with zero published posts.
          Sorted alphabetically by tag name.
        acceptance_criteria:
          - "Returns tags with their published post counts"
          - "Excludes tags with zero published posts"
          - "Sorted alphabetically by tag name"
        files_to_modify:
          - "backend/src/TacBlog.Application/Features/Tags/BrowsePublicTags.cs"
          - "backend/tests/TacBlog.Application.Tests/Features/Tags/BrowsePublicTagsShould.cs"

      - step_id: "01-05"
        title: "GetRelatedPosts use case"
        description: >
          Create GetRelatedPosts use case. Given a post slug, returns up to 3
          related published posts ranked by shared tag count (descending),
          then by publishedAt (newest first) as tie-breaker.
          Excludes the source post. Returns NotFound for non-existent slugs.
        acceptance_criteria:
          - "Returns up to 3 related published posts"
          - "Ranked by shared tag count descending"
          - "Tie-broken by publishedAt newest first"
          - "Excludes the source post from results"
          - "Returns NotFound for non-existent post slug"
          - "Returns empty list when no related posts exist"
        files_to_modify:
          - "backend/src/TacBlog.Application/Features/Posts/GetRelatedPosts.cs"
          - "backend/tests/TacBlog.Application.Tests/Features/Posts/GetRelatedPostsShould.cs"

  - id: "02"
    name: "Repository Extensions"
    description: "Add repository methods needed for public reading queries"
    steps:
      - step_id: "02-01"
        title: "IBlogPostRepository public reading methods"
        description: >
          Add methods to IBlogPostRepository:
          - FindPublishedAsync() — all published posts sorted by publishedAt desc
          - FindPublishedByTagSlugAsync(Slug tagSlug) — published posts with given tag
          Update EfBlogPostRepository with implementations.
          Also add to ITagRepository:
          - GetPublicTagsWithPostCountsAsync() — tags with published post counts, excluding zero-count tags
          Update EfTagRepository with implementation.
        acceptance_criteria:
          - "FindPublishedAsync returns only published posts sorted by publishedAt desc"
          - "FindPublishedByTagSlugAsync returns published posts for a tag"
          - "GetPublicTagsWithPostCountsAsync excludes tags with zero published posts"
        files_to_modify:
          - "backend/src/TacBlog.Application/Ports/Driven/IBlogPostRepository.cs"
          - "backend/src/TacBlog.Application/Ports/Driven/ITagRepository.cs"
          - "backend/src/TacBlog.Infrastructure/Persistence/EfBlogPostRepository.cs"
          - "backend/src/TacBlog.Infrastructure/Persistence/EfTagRepository.cs"
        dependencies: ["01-01", "01-02", "01-03", "01-04", "01-05"]

  - id: "03"
    name: "API Endpoints — Public Reading"
    description: "Wire public reading use cases to API endpoints"
    steps:
      - step_id: "03-01"
        title: "Public reading endpoints and DI wiring"
        description: >
          Add/modify public endpoints:
          - GET /api/posts (modify existing to use BrowsePublishedPosts, exclude content)
          - GET /api/posts/{slug} (modify existing to use ReadPublishedPost for anonymous)
          - GET /api/posts?tag={slug} (filter by tag via query param, or GET /api/tags/{slug}/posts)
          - GET /api/tags (public tag list with counts, exclude empty tags)
          - GET /api/posts/{slug}/related (related posts endpoint)
          Register new use cases in Program.cs DI.
          Consider: existing GET /api/posts uses repository directly — refactor to use case.
        acceptance_criteria:
          - "Public endpoints allow anonymous access"
          - "Draft posts never returned through public endpoints"
          - "Related posts endpoint returns max 3 ranked posts"
          - "Tags endpoint excludes empty tags"
          - "All new use cases registered in DI"
        files_to_modify:
          - "backend/src/TacBlog.Api/Endpoints/PostEndpoints.cs"
          - "backend/src/TacBlog.Api/Endpoints/TagEndpoints.cs"
          - "backend/src/TacBlog.Api/Program.cs"
        dependencies: ["02-01"]

  - id: "04"
    name: "Acceptance Tests"
    description: "Wire acceptance tests for all 21 Epic 4 scenarios"
    steps:
      - step_id: "04-01"
        title: "Acceptance test step definitions — Epic 4 scenarios GREEN"
        description: >
          Remove @skip from all 6 Epic 4 feature files. Implement pending
          step definitions in PostSteps.cs and TagSteps.cs. All 21 Epic 4
          scenarios must pass. Verify full regression (all epics green).
          Step definitions already scaffolded with PendingStepException —
          replace with real implementations using existing API drivers.
        acceptance_criteria:
          - "All 21 Epic 4 scenarios pass"
          - "No regressions in Epic 0-3 tests"
          - "Step definitions use existing PostApiDriver and TagApiDriver"
        files_to_modify:
          - "backend/tests/TacBlog.Acceptance.Tests/Features/Epic4_PublicReading/*.feature"
          - "backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/PostSteps.cs"
          - "backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/TagSteps.cs"
          - "backend/tests/TacBlog.Acceptance.Tests/Drivers/PostApiDriver.cs"
          - "backend/tests/TacBlog.Acceptance.Tests/Drivers/TagApiDriver.cs"
        dependencies: ["03-01"]

      - step_id: "04-02"
        title: "Full regression verification"
        description: >
          Run complete test suite. Verify all layers green:
          domain, application, API integration, acceptance (all epics).
        acceptance_criteria:
          - "All tests pass across all layers"
          - "No regressions from Epic 0-3"
        files_to_modify: []
        dependencies: ["04-01"]
