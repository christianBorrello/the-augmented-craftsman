roadmap:
  project_id: epic1-authentication
  feature: US-010 -- Authenticate as admin
  created_at: '2026-03-06T21:43:11Z'
  total_steps: 10
  phases: 5
  description: 'Admin authentication with ASP.NET Identity password hashing, JWT token
    generation, account lockout, and write endpoint protection. Single admin user
    seeded from environment variables.

    '
  traceability:
    user_story: US-010
    feature_file: backend/tests/TacBlog.Acceptance.Tests/Features/Epic1_PostManagement/Authentication.feature
    scenarios: 5
    architecture_doc: docs/design/architecture-design.md
    api_contract: docs/design/api-contracts.md
phases:
- id: '01'
  name: Ports and test infrastructure
  description: 'Define driven ports (IPasswordHasher, ITokenGenerator) and prepare
    acceptance test infrastructure for authentication scenarios.

    '
  steps:
  - id: 01-01
    name: Define authentication driven ports
    tdd_phase: PREPARE
    description: 'Create IPasswordHasher (Hash, Verify) and ITokenGenerator (Generate)
      port interfaces in Application layer. Enable Authentication.feature by removing
      @skip tag.

      '
    acceptance_criteria:
    - IPasswordHasher port defines hash and verify operations
    - ITokenGenerator port defines token generation operation
    - '@skip tag removed from Authentication.feature'
    - Authentication scenarios compile but fail (RED outer loop)
    files_to_modify:
    - backend/src/TacBlog.Application/Ports/Driven/IPasswordHasher.cs
    - backend/src/TacBlog.Application/Ports/Driven/ITokenGenerator.cs
    - backend/tests/TacBlog.Acceptance.Tests/Features/Epic1_PostManagement/Authentication.feature
    notes: 'Ports live in Application layer. No implementation yet. The feature file
      scenarios should compile against existing step definitions in AuthSteps.cs (already
      scaffolded with PendingStepException).

      '
- id: '02'
  name: Login use case (happy path + credential failures)
  description: 'TDD the Login handler covering successful login, wrong password, and
    unknown email. Maps to scenarios 1, 2, and 3.

    '
  steps:
  - id: 02-01
    name: Login handler unit tests (RED)
    tdd_phase: RED_UNIT
    description: 'Write LoginShould unit tests: successful login returns token, wrong
      password returns failure, unknown email returns failure. Stub IPasswordHasher
      and ITokenGenerator via NSubstitute.

      '
    acceptance_criteria:
    - LoginShould tests fail for the right reason (handler not implemented)
    - Tests stub driven ports, assert observable outcomes only
    - 'Three test cases: valid credentials, wrong password, unknown email'
    files_to_modify:
    - backend/tests/TacBlog.Application.Tests/Features/Auth/LoginShould.cs
    notes: 'Admin credentials (email + hashed password) stored as configuration. Handler
      receives credentials, verifies via IPasswordHasher, generates token via ITokenGenerator.
      No database entity for single admin user.

      '
  - id: 02-02
    name: Login handler implementation (GREEN)
    tdd_phase: GREEN
    description: 'Implement LoginCommand, LoginHandler in Application/Features/Auth/Login.cs.
      Return token on valid credentials, error on invalid. All LoginShould tests pass.

      '
    acceptance_criteria:
    - All LoginShould unit tests pass
    - Login handler uses IPasswordHasher to verify credentials
    - Login handler uses ITokenGenerator to produce token on success
    - Same error message for wrong password and unknown email
    files_to_modify:
    - backend/src/TacBlog.Application/Features/Auth/Login.cs
    notes: 'Admin email and hashed password injected via AdminCredentials options class
      bound to "AdminCredentials" config section. In production, values come from environment
      variables. In development, from appsettings.Development.json. WebApplicationFactory
      overrides with test-specific values (test@example.com / pre-hashed test password).
      Error message must be "Invalid email or password" for both wrong password and
      unknown email (prevent enumeration).

      '
  - id: 02-03
    name: Driven adapters and API endpoint (GREEN acceptance)
    tdd_phase: GREEN
    description: 'Implement AspNetPasswordHasher, JwtTokenGenerator adapters. Create
      AuthEndpoints with POST /api/auth/login. Wire DI in Program.cs. Implement pending
      AuthSteps. Scenarios 1-3 pass.

      '
    acceptance_criteria:
    - POST /api/auth/login returns 200 with token for valid credentials
    - POST /api/auth/login returns 401 with error for invalid credentials
    - Acceptance scenarios 1, 2, 3 pass GREEN
    files_to_modify:
    - backend/src/TacBlog.Infrastructure/Identity/AspNetPasswordHasher.cs
    - backend/src/TacBlog.Infrastructure/Identity/JwtTokenGenerator.cs
    - backend/src/TacBlog.Api/Endpoints/AuthEndpoints.cs
    - backend/src/TacBlog.Api/Program.cs
    - backend/src/TacBlog.Api/appsettings.Development.json
    - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/AuthSteps.cs
    - backend/tests/TacBlog.Acceptance.Tests/Support/TacBlogWebApplicationFactory.cs
    notes: 'WebApplicationFactory must configure test JWT secret and admin credentials.
      Admin password stored as pre-hashed value in config. AspNetPasswordHasher wraps
      ASP.NET Identity PasswordHasher<T>. JwtTokenGenerator uses configurable secret,
      issuer, and expiry.

      '
  - id: 02-04
    name: Refactor and commit
    tdd_phase: COMMIT
    description: 'Refactor login flow while all tests green. Commit scenarios 1-3.

      '
    acceptance_criteria:
    - All existing tests remain GREEN (Epic 0 + scenarios 1-3)
    - No code smells in login path
    files_to_modify: []
    notes: 'Verify Epic 0 tests still pass. POST /api/posts is still unprotected at
      this point -- protection comes in phase 04.

      '
- id: '03'
  name: Account lockout
  description: 'TDD account lockout: 5 failed attempts in 10 minutes triggers 15-minute
    lockout. Maps to scenario 4.

    '
  steps:
  - id: 03-01
    name: Lockout unit tests and implementation
    tdd_phase: RED_UNIT
    description: 'Add lockout tests to LoginShould: locked after 5 failures in 10
      min, lockout expires after 15 min, successful login resets counter. Implement
      lockout logic in Login handler using IClock for testability.

      '
    acceptance_criteria:
    - Login returns lockout error after 5 failed attempts within 10 minutes
    - Lockout expires after 15 minutes (next attempt succeeds if valid)
    - Successful login resets failure counter
    - Failed attempts outside the 10-minute window do not count toward lockout
    files_to_modify:
    - backend/tests/TacBlog.Application.Tests/Features/Auth/LoginShould.cs
    - backend/src/TacBlog.Application/Features/Auth/Login.cs
    notes: 'Lockout state can be in-memory (single instance API, single admin). IClock
      already exists from walking skeleton -- use it for time-based lockout tests.
      Response status 429 with specific error message.

      '
  - id: 03-02
    name: Lockout acceptance scenario (GREEN + COMMIT)
    tdd_phase: GREEN
    description: 'Implement pending AuthSteps for lockout scenario. Wire 429 status
      mapping in AuthEndpoints. Scenario 4 passes GREEN. Commit.

      '
    acceptance_criteria:
    - Acceptance scenario 4 (account lockout) passes GREEN
    - 429 response contains 'Too many attempts. Try again in 15 minutes.'
    - All previous scenarios remain GREEN
    files_to_modify:
    - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/AuthSteps.cs
    - backend/src/TacBlog.Api/Endpoints/AuthEndpoints.cs
    notes: 'AuthSteps GivenChristianHasFailedLoginNTimes must call login endpoint
      N times with wrong password before the When step.

      '
- id: '04'
  name: JWT middleware and write endpoint protection
  description: 'Add JWT authentication middleware and protect all write endpoints.
    Maps to scenario 5. Requires Epic 0 test adaptation.

    '
  steps:
  - id: 04-01
    name: JWT middleware and endpoint protection
    tdd_phase: RED_UNIT
    description: 'Add AuthEndpointsShould integration tests: unauthenticated POST
      /api/posts returns 401, authenticated POST /api/posts returns 201. Configure
      JWT bearer middleware in Program.cs. Add RequireAuthorization() to POST /api/posts
      endpoint.

      '
    acceptance_criteria:
    - POST /api/posts without JWT returns 401
    - POST /api/posts with valid JWT returns 201
    - GET endpoints remain public (no auth required)
    - AuthEndpointsShould integration tests pass
    files_to_modify:
    - backend/tests/TacBlog.Api.Tests/Endpoints/AuthEndpointsShould.cs
    - backend/src/TacBlog.Api/Program.cs
    - backend/src/TacBlog.Api/Endpoints/PostEndpoints.cs
    notes: 'JWT middleware must be added before endpoint mapping. Use route groups
      or per-endpoint RequireAuthorization(). GET /api/posts and GET /api/posts/{slug}
      remain public (AllowAnonymous).

      '
  - id: 04-02
    name: Adapt Epic 0 tests and acceptance scenario 5 (GREEN + COMMIT)
    tdd_phase: GREEN
    description: 'Update Epic 0 acceptance tests to authenticate before POST /api/posts.
      Implement pending AuthSteps for scenario 5 (unauthenticated access). All tests
      GREEN. Commit.

      '
    acceptance_criteria:
    - Acceptance scenario 5 (unauthenticated 401) passes GREEN
    - All Epic 0 acceptance tests remain GREEN (now authenticate first)
    - GET endpoints still work without authentication
    files_to_modify:
    - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/PostSteps.cs
    - backend/tests/TacBlog.Acceptance.Tests/Drivers/PostApiDriver.cs
    - backend/tests/TacBlog.Acceptance.Tests/StepDefinitions/AuthSteps.cs
    - backend/tests/TacBlog.Acceptance.Tests/Features/Epic0_WalkingSkeleton/CreateAndRetrievePost.feature
    notes: 'Breaking change: Epic 0 POST /api/posts scenarios now require auth. Add
      explicit "Given Christian is authenticated" step to Epic 0 feature files before
      any POST request. PostApiDriver must attach JWT from AuthContext to POST requests.
      AuthApiDriver.Authenticate() logs in and stores JWT in AuthContext. This makes
      the auth prerequisite visible in Gherkin rather than hidden in driver code.

      '
- id: '05'
  name: Final validation and cleanup
  description: 'End-to-end validation, refactoring, and documentation update.

    '
  steps:
  - id: 05-01
    name: Full regression and final refactor
    tdd_phase: COMMIT
    description: 'Run full test suite (dotnet test). Refactor across all auth-related
      files. Verify API contract compliance. Commit final state.

      '
    acceptance_criteria:
    - All 5 Authentication.feature scenarios GREEN
    - All Epic 0 scenarios GREEN
    - All unit and integration tests GREEN
    - API responses match docs/design/api-contracts.md
    files_to_modify: []
    notes: 'Verify response shapes: 200 {token, expiresAt}, 401 {error}, 429 {error}.
      Check no auth leaks on public GET endpoints.

      '
implementation_scope:
  source_directories:
  - backend/src/TacBlog.Application/Ports/Driven/
  - backend/src/TacBlog.Application/Features/Auth/
  - backend/src/TacBlog.Infrastructure/Identity/
  - backend/src/TacBlog.Api/Endpoints/
  - backend/src/TacBlog.Api/
  test_directories:
  - backend/tests/TacBlog.Application.Tests/Features/Auth/
  - backend/tests/TacBlog.Api.Tests/Endpoints/
  - backend/tests/TacBlog.Acceptance.Tests/
  excluded_patterns:
  - obj/**
  - bin/**
validation:
  status: approved
  reviewer: solution-architect-reviewer
  approved_at: null
  quality_checks:
    step_ratio: 10 steps / 8 production files = 1.25 (target <= 2.5)
    scenario_mapping: 5 scenarios mapped across phases 02-04
    ac_behavioral: All AC describe observable outcomes, no implementation details
    outside_in_tdd: Outer loop (acceptance) drives inner loop (unit) in each phase
    breaking_change_handled: Phase 04-02 adapts Epic 0 tests for auth requirement
  review_iterations:
  - iteration: 1
    verdict: NEEDS_REVISION
    findings_resolved:
      D1_scenario5_placement: DISMISSED - scenario 5 maps to unauthenticated access
        which requires JWT middleware (phase 04), placement is correct per requirements
      D2_epic0_adaptation: ACCEPTED - removed ambiguity, explicit Given step approach
        chosen over hidden auto-auth in driver
      D3_lockout_edge_case: ACCEPTED - added AC for failures outside 10-min window
      D4_credentials_config: ACCEPTED - specified AdminCredentials options class,
        env vars for prod, appsettings for dev, WebApplicationFactory overrides for test
      D5_epic0_approach: MERGED_WITH_D2 - same concern, resolved together
      D6_test_parametrization: NOTED - style preference, not a blocker
  - iteration: 2
    verdict: APPROVED
    notes: Zero critical issues. D7 (test context wiring) noted for implementation.
