name: CI

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Check formatting
        run: dotnet format --verify-no-changes --verbosity diagnostic
        working-directory: backend

      - name: Build
        run: dotnet build -c Release --no-restore
        working-directory: backend

      - name: Unit tests (Domain)
        run: dotnet test tests/TacBlog.Domain.Tests/ -c Release --no-build --logger "trx;LogFileName=domain.trx"
        working-directory: backend

      - name: Unit tests (Application)
        run: dotnet test tests/TacBlog.Application.Tests/ -c Release --no-build --logger "trx;LogFileName=application.trx"
        working-directory: backend

      - name: Unit tests (Infrastructure)
        run: dotnet test tests/TacBlog.Infrastructure.Tests/ -c Release --no-build --filter "Category!=RequiresCredentials" --logger "trx;LogFileName=infrastructure.trx"
        working-directory: backend

      - name: Integration tests
        run: dotnet test tests/TacBlog.Api.Tests/ -c Release --no-build --logger "trx;LogFileName=integration.trx"
        working-directory: backend

      - name: Acceptance tests
        run: dotnet test tests/TacBlog.Acceptance.Tests/ -c Release --no-build --filter "Category!=manual" --logger "trx;LogFileName=acceptance.trx"
        working-directory: backend

      - name: Build Docker image
        run: docker build -t tacblog-api:${{ github.sha }} .
        working-directory: backend

      - name: Push to GHCR
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        env:
          REGISTRY: ghcr.io
          IMAGE: ghcr.io/${{ github.repository_owner }}/tacblog-api
        run: |
          IMAGE_LC=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login "$REGISTRY" -u ${{ github.actor }} --password-stdin
          docker tag tacblog-api:${{ github.sha }} "${IMAGE_LC}:${{ github.sha }}"
          docker tag tacblog-api:${{ github.sha }} "${IMAGE_LC}:latest"
          docker push "${IMAGE_LC}:${{ github.sha }}"
          docker push "${IMAGE_LC}:latest"

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Install Koyeb CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          echo "/home/runner/.koyeb/bin" >> $GITHUB_PATH

      - name: Force Koyeb to pull latest image
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          koyeb services update ${{ vars.KOYEB_SERVICE }} \
            --app ${{ vars.KOYEB_APP }} \
            --docker "ghcr.io/${{ github.repository_owner }}/tacblog-api:latest"

      - name: Wait for deployment to become healthy
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          echo "Waiting for Koyeb deployment to become healthy..."
          for i in $(seq 1 24); do
            STATUS=$(koyeb services describe ${{ vars.KOYEB_SERVICE }} \
              --app ${{ vars.KOYEB_APP }} \
              --output json 2>/dev/null | jq -r '.status' 2>/dev/null || echo "unknown")
            echo "Attempt $i/24: status=$STATUS"
            if [ "$STATUS" = "HEALTHY" ]; then
              echo "Deployment is healthy"
              exit 0
            fi
            sleep 10
          done
          echo "Deployment did not become healthy within 4 minutes"
          exit 1

  smoke-test:
    needs: deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')

    steps:
      - name: Smoke test (liveness)
        env:
          SMOKE_URL: ${{ vars.API_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SMOKE_URL}/health")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: /health returned $STATUS"
            exit 1
          fi

      - name: Smoke test (readiness)
        env:
          SMOKE_URL: ${{ vars.API_URL }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SMOKE_URL}/health/ready")
          if [ "$STATUS" != "200" ]; then
            echo "Smoke test failed: /health/ready returned $STATUS (database may be unreachable)"
            exit 1
          fi
